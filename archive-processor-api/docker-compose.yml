services:
  server:
    build:
      context: .
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.12.10}
    restart: always
    env_file: .env
    ports:
        - "${PORT:-8000}:${PORT:-8000}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host ${HOST:-0.0.0.0} --port ${PORT:-8000}

  worker:
    build:
      context: .
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.12.10}
    restart: always
    env_file: .env
    volumes:
      - tfidf-indices:/app/data/indices
      - ./data/uploads:/app/data/uploads:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: python -m app.worker.main

  db:
    image: postgres:15-alpine
    restart: always
    env_file: .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

volumes:
  tfidf-indices:
  db-data:
  redis-data: