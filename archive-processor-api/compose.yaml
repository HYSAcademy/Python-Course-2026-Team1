services:
  server:
    build:
      context: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://archive_user:archive_password@db:5432/archive_db

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: archive_user
      POSTGRES_PASSWORD: archive_password
      POSTGRES_DB: archive_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archive_user -d archive_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: